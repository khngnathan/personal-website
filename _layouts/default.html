<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>(function(){try{var s=localStorage.getItem('theme');document.documentElement.setAttribute('data-theme',s||'light');}catch(e){}})();</script>
  <title>{{ page.title }}</title>
  {%- if page.description %}
  <meta name="description" content="{{ page.description }}">
  {%- endif %}
  <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
  <meta name="google-site-verification" content="_nOXsycL10OXJfaoVhpwKaDWx5ZbRNlY-SUzfpK19hg">

  <!-- Open Graph (LinkedIn, Slack, Facebook link previews) -->
  <meta property="og:title" content="{{ page.title }}">
  {%- if page.description %}
  <meta property="og:description" content="{{ page.description }}">
  {%- endif %}
  <meta property="og:type" content="profile">
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
  <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/img/photo.png">
  <meta property="og:site_name" content="{{ site.title }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page.title }}">
  {%- if page.description %}
  <meta name="twitter:description" content="{{ page.description }}">
  {%- endif %}
  <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/assets/img/photo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap">
  <link rel="stylesheet" href="style.css?v={{ site.time | date: '%s' }}">
</head>
